date: "2025-08-19 ~ 2025-09-20"
title: "공학교육혁신사업단 학부 멘토링 프로그램"
description: |
  2025년도에도 우리 연구실에서 공학교육혁신사업단에서 주최하는 학부 멘토링 프로그램을 맡아, 학부생들이 연구실에서 실습 및 멘토링 프로젝트를 수행하였습니다.

  프로그램 개요
  - 산업체 현직 멘토와 함께 스터디/연구/논문 등을 체험할 수 있는 좋은 기회
  - 주제는 Graph ML (Graph Neural Network), Natural Language Processing, Recommender Systems 등
  - 2~4주 정도의 멘토링 프로젝트 진행 및 보고서 작성

  학부생들에게 실질적인 연구 및 프로젝트 경험을 제공하고, 대학원 진학 및 진로 결정에 도움이 되는 유익한 시간이었습니다.

  사진#3: 이재진 인턴
  사진#4: 사예원 인턴
  사진#5: 이동현 인턴
  사진#6: 김세영 인턴
  사진#7: 강유진 인턴
  사진#1, 2: 참석자 전체
