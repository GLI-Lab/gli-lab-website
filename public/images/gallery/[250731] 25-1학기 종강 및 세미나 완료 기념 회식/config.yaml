date: "2025-07-31"
title: "25-1학기 종강 및 세미나 완료 기념 회식"
description: |
  혜윤, 지명, 동천 석사과정과 9월에 합류할 해윤 석사과정과 본유 박사과정의 2025 여름방학 세미나를 성공적으로 완료하였습니다.
  세미나 완료와 2025년도 1학기 종강을 기념하여 대학원 및 학부연구생들과 회식을 진행하였습니다.
  한 학기 동안 다들 고생 많았습니다.
  어느새 연구실 구성원이 이렇게 많아졌습니다. 앞으로도 각자의 자리에서 유의미한 연구 성과를 낼 수 있도록 모두 함께 화이팅하겠습니다!
  ※ 이영호 학부생은 아쉽게 참여하지 못했습니다.

  사진#1 (왼쪽부터): 
    박지연 인턴, 구해윤 예비 석사과정, 백혜윤 석사과정, 정우석 인턴, 서지명 석사과정, 
    이동천 석사과정, 지상준 인턴, 오병국 교수, 최진호 인턴, 박상현 인턴,
    김상준 인턴, 김영진 인턴, 조은영 인턴, 구본유 예비 박사과정
